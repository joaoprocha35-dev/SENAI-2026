<!doctype html>
<html lang="pt-br">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GAMEHUB_ — Modifying Game Asset</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap"
    rel="stylesheet">

  <style>
    :root {
      --bg-900: #080808;
      --card-bg: #121212;
      --neon-blue: #00f3ff;
      --neon-purple: #bc13fe;
      --neon-amber: #f5b042;
      --text-main: #e2e8f0;
      --text-dim: #64748b;
      --line: rgba(0, 243, 255, 0.15);
    }

    body {
      background-color: var(--bg-900);
      color: var(--text-main);
      font-family: 'Rajdhani', sans-serif;
      background-image:
        radial-gradient(circle at 100% 0%, rgba(188, 19, 254, 0.1) 0%, transparent 40%),
        radial-gradient(circle at 0% 100%, rgba(0, 243, 255, 0.1) 0%, transparent 40%);
      min-height: 100vh;
    }

    .orbitron {
      font-family: 'Orbitron', sans-serif;
    }

    /* Navbar */
    .app-nav {
      background: rgba(0, 0, 0, 0.9);
      border-bottom: 2px solid var(--neon-purple);
      backdrop-filter: blur(12px);
    }

    .navbar-brand {
      font-family: 'Orbitron', sans-serif;
      color: var(--neon-blue) !important;
      text-shadow: 0 0 10px var(--neon-blue);
    }

    .nav-link {
      color: var(--text-dim) !important;
      text-transform: uppercase;
      font-weight: 600;
    }

    .nav-link:hover,
    .nav-link.active {
      color: var(--neon-purple) !important;
      text-shadow: 0 0 8px var(--neon-purple);
    }

    /* Form Card */
    .edit-card {
      background: var(--card-bg);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 3rem;
      box-shadow: 0 0 40px rgba(0, 0, 0, 0.6);
      position: relative;
    }

    .edit-card::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 3px;
      background: linear-gradient(90deg, var(--neon-blue), var(--neon-purple));
    }

    .form-label {
      color: var(--neon-blue);
      font-family: 'Orbitron', sans-serif;
      font-size: 0.75rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .form-control {
      background: rgba(255, 255, 255, 0.03) !important;
      border: 1px solid rgba(255, 255, 255, 0.1) !important;
      color: var(--text-main) !important;
      border-radius: 4px !important;
      padding: 0.75rem 1rem !important;
      transition: all 0.3s;
    }

    .form-control:focus {
      border-color: var(--neon-blue) !important;
      box-shadow: 0 0 15px rgba(0, 243, 255, 0.2) !important;
      background: rgba(0, 243, 255, 0.05) !important;
    }

    .form-control[readonly] {
      background: #000 !important;
      border-color: var(--neon-purple) !important;
      color: var(--neon-purple) !important;
      font-family: monospace;
      opacity: 0.8;
    }

    /* Buttons */
    .btn-save {
      background: transparent;
      color: var(--neon-amber);
      border: 1px solid var(--neon-amber);
      font-family: 'Orbitron', sans-serif;
      font-weight: 700;
      padding: 0.8rem 2rem;
      transition: all 0.3s;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .btn-save:hover {
      background: var(--neon-amber);
      color: #000;
      box-shadow: 0 0 25px rgba(245, 176, 66, 0.4);
    }

    .info-tag {
      font-size: 0.65rem;
      color: var(--text-dim);
      border-left: 2px solid var(--neon-amber);
      padding-left: 10px;
      margin-top: 5px;
    }
  </style>
</head>

<body>

  <nav class="navbar navbar-expand-lg app-nav">
    <div class="container">
      <a class="navbar-brand fw-bold" href="/">GAMEHUB_</a>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto gap-3">
          <li class="nav-item"><a class="nav-link" href="/">Início</a></li>
          <li class="nav-item dropdown">
            <a class="nav-link dropdown-toggle active" href="#" data-bs-toggle="dropdown">Games</a>
            <ul class="dropdown-menu dropdown-menu-dark">
              <li><a class="dropdown-item" href="/cadastrar-livro">Add Game</a></li>
              <li><a class="dropdown-item" href="/listar-livro">Game List</a></li>
            </ul>
          </li>
          <li class="nav-item"><a class="nav-link" href="/listar-leitor">Players</a></li>
          <li class="nav-item"><a class="nav-link" href="/listar-emprestimo">Logs</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="container py-5 mt-4">
    <div class="row justify-content-center">
      <div class="col-lg-7">

        <div class="text-center mb-5">
          <h2 class="orbitron text-white">GAME_CONFIGURATION</h2>
          <p class="text-dim">Reconfigurando os parâmetros do título: <span class="text-info">{{ livro[1] }}</span></p>
        </div>

        <form class="edit-card" action="/editar-livro" method="post">

          <div class="row">
            <div class="col-md-6 mb-4">
              <label for="isbn" class="form-label">Game_Serial (ISBN)</label>
              <input type="text" class="form-control" id="isbn" name="isbn" value="{{ livro[0] }}" readonly>
              <div class="info-tag">SYSTEM_ID: UNALTERABLE</div>
            </div>

            <div class="col-md-6 mb-4">
              <label for="titulo" class="form-label">Game_Title</label>
              <input type="text" class="form-control" id="titulo" name="titulo" value="{{ livro[1] }}" required>
            </div>
          </div>

          <div class="row">
            <div class="col-md-6 mb-4">
              <label for="autor" class="form-label">Lead_Developer</label>
              <input type="text" class="form-control" id="autor" name="autor" value="{{ livro[2] }}" required>
            </div>

            <div class="col-md-6 mb-4">
              <label for="editora" class="form-label">Publisher_Label</label>
              <input type="text" class="form-control" id="editora" name="editora" value="{{ livro[3] }}" required>
            </div>
          </div>

          <div class="row">
            <div class="col-md-4 mb-4">
              <label for="ano" class="form-label">Launch_Year</label>
              <input type="text" class="form-control" id="ano" name="ano" value="{{ livro[4] }}" required>
            </div>

            <div class="col-md-4 mb-4">
              <label for="genero" class="form-label">Category / Genre</label>
              <input type="text" class="form-control" id="genero" name="genero" value="{{ livro[5] }}" required>
            </div>

            <div class="col-md-4 mb-4">
              <label for="edicao" class="form-label">Software_Version</label>
              <input type="text" class="form-control" id="edicao" name="edicao" value="{{ livro[6] }}" required>
            </div>
          </div>

          <div class="mt-4 d-flex justify-content-between align-items-center">
            <a href="/listar-livro" class="text-dim text-decoration-none small orbitron">
              <i class="bi bi-x-circle"></i> ABORT_CHANGES
            </a>
            <button type="submit" class="btn btn-save">
              <i class="bi bi-cpu me-2"></i> UPDATE_METADATA
            </button>
          </div>

        </form>

      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
