<!doctype html>
<html lang="pt-br">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GAMEHUB_ — Iniciar Locação</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@400;600;700&display=swap"
    rel="stylesheet">

  <style>
    :root {
      --bg-900: #0b0805;
      --neon-blue: #00f3ff;
      --neon-purple: #bc13fe;
      --text-main: #ece4d3;
    }

    body {
      background-color: var(--bg-900);
      color: var(--text-main);
      font-family: 'Rajdhani', sans-serif;
      background-image:
        radial-gradient(circle at 100% 0%, rgba(188, 19, 254, 0.15) 0%, transparent 40%),
        radial-gradient(circle at 0% 100%, rgba(0, 243, 255, 0.15) 0%, transparent 40%);
      min-height: 100vh;
    }

    .orbitron {
      font-family: 'Orbitron', sans-serif;
    }

    /* Navbar Estilo Index */
    .app-nav {
      background: rgba(0, 0, 0, 0.8);
      border-bottom: 1px solid rgba(188, 19, 254, 0.3);
      backdrop-filter: blur(10px);
    }

    .navbar-brand {
      font-family: 'Orbitron', sans-serif;
      color: var(--neon-blue) !important;
      text-shadow: 0 0 10px var(--neon-blue);
    }

    /* Card Centralizado */
    .glass-card {
      background: rgba(20, 20, 20, 0.6);
      border: 1px solid rgba(188, 19, 254, 0.2);
      border-radius: 15px;
      backdrop-filter: blur(5px);
      padding: 40px;
      box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
    }

    .form-label {
      color: var(--neon-blue);
      text-transform: uppercase;
      font-size: 0.75rem;
      letter-spacing: 1px;
      font-weight: 700;
    }

    .form-control {
      background: rgba(255, 255, 255, 0.05) !important;
      border: 1px solid rgba(255, 255, 255, 0.1) !important;
      color: #fff !important;
      padding: 12px;
    }

    .form-control:focus {
      border-color: var(--neon-purple) !important;
      box-shadow: 0 0 15px rgba(188, 19, 254, 0.3) !important;
    }

    .btn-execute {
      background: linear-gradient(90deg, var(--neon-blue), var(--neon-purple));
      border: none;
      color: #000;
      font-weight: 900;
      font-family: 'Orbitron', sans-serif;
      padding: 15px;
      letter-spacing: 1px;
      transition: 0.3s;
    }

    .btn-execute:hover {
      transform: scale(1.02);
      box-shadow: 0 0 20px rgba(0, 243, 255, 0.5);
    }
  </style>
</head>

<body>

  <nav class="navbar navbar-expand-lg app-nav mb-5">
    <div class="container">
      <a class="navbar-brand fw-bold" href="/">GAMEHUB_</a>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link text-white px-3" href="/">Início</a></li>
          <li class="nav-item"><a class="nav-link text-white px-3" href="/listar-game">Games</a></li>
          <li class="nav-item"><a class="nav-link text-white px-3" href="/listar-jogador">Players</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="container">
    <div class="row justify-content-center">
      <div class="col-lg-7">

        <header class="text-center mb-5">
          <h2 class="orbitron text-white">INITIALIZE_RENTAL</h2>
          <p style="color: var(--neon-purple)">Vincule um Asset ID a um Player Profile.</p>
        </header>

        <form action="/realizar-emprestimo" method="post" class="glass-card">
          <div class="row g-4">
            <div class="col-md-6">
              <label class="form-label">Player Serial (CPF)</label>
              <input type="text" name="cpf" class="form-control" placeholder="000.000.000-00" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">Asset Serial (ISBN)</label>
              <input type="text" name="isbn" class="form-control" placeholder="978-0000000000" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">Start_Date</label>
              <input type="date" name="data-emprestimo" class="form-control" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">Deadline_Return</label>
              <input type="date" name="data-devolucao" class="form-control" required>
            </div>
          </div>

          <div class="mt-5 d-flex justify-content-between align-items-center">
            <a href="/listar-emprestimo" class="text-secondary text-decoration-none orbitron small">Abort_Mission</a>
            <button type="submit" class="btn btn-execute px-5">EXECUTE_RENTAL</button>
          </div>
        </form>

      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
