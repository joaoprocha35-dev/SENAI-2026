<!doctype html>
<html lang="pt-br">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GameCenter — Cadastrar Novo Game</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap"
    rel="stylesheet">

  <style>
    :root {
      --bg-900: #050505;
      --card-bg: #0f0f0f;
      --neon-purple: #bc13fe;
      --neon-blue: #00f3ff;
      --neon-green: #39ff14;
      --text-main: #e0e0e0;
      --text-dim: #94a3b8;
      --line: rgba(188, 19, 254, 0.2);
    }

    body {
      background-color: var(--bg-900);
      color: var(--text-main);
      font-family: 'Rajdhani', sans-serif;
      background-image: radial-gradient(circle at 90% 10%, rgba(0, 243, 255, 0.05) 0%, transparent 40%);
      min-height: 100vh;
    }

    .orbitron {
      font-family: 'Orbitron', sans-serif;
    }

    /* Animação de escrita no título */
    .typing-animation {
      display: inline-block;
      overflow: hidden;
      white-space: nowrap;
      border-right: 3px solid var(--neon-green);
      animation: typing 2s steps(30, end), blink-caret .75s step-end infinite;
    }

    @keyframes typing {
      from {
        width: 0
      }

      to {
        width: 100%
      }
    }

    @keyframes blink-caret {

      from,
      to {
        border-color: transparent
      }

      50% {
        border-color: var(--neon-green);
      }
    }

    /* Estilo do Formulário */
    .form-card {
      background: var(--card-bg);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
    }

    .form-label {
      color: var(--neon-blue);
      text-transform: uppercase;
      font-weight: 700;
      font-size: 0.8rem;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }

    .form-control {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid #333;
      color: #fff;
      border-radius: 8px;
      padding: 12px;
      transition: all 0.3s;
    }

    .form-control:focus {
      background: rgba(255, 255, 255, 0.07);
      border-color: var(--neon-purple);
      box-shadow: 0 0 15px rgba(188, 19, 254, 0.3);
      color: #fff;
    }

    /* Game Card Preview */
    .game-preview-card {
      background: #151515;
      border: 2px solid var(--neon-blue);
      border-radius: 15px;
      height: 400px;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 20px;
      box-shadow: 0 0 25px rgba(0, 243, 255, 0.2);
    }

    .game-preview-card::before {
      content: "GAME_ID";
      position: absolute;
      top: 10px;
      right: 15px;
      font-family: 'Orbitron';
      font-size: 0.7rem;
      color: var(--neon-blue);
      opacity: 0.5;
    }

    .game-header {
      background: linear-gradient(to top, rgba(0, 0, 0, 0.9), transparent);
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 40px 20px 20px;
    }

    .pv-title {
      font-family: 'Orbitron';
      font-size: 1.5rem;
      color: #fff;
      margin-bottom: 5px;
    }

    .pv-platform {
      color: var(--neon-green);
      font-weight: bold;
      text-transform: uppercase;
      font-size: 0.9rem;
    }

    .btn-save {
      background: var(--neon-green);
      color: #000;
      font-family: 'Orbitron';
      font-weight: 900;
      border: none;
      padding: 15px;
      border-radius: 5px;
      width: 100%;
      clip-path: polygon(5% 0, 100% 0, 95% 100%, 0% 100%);
      transition: 0.3s;
    }

    .btn-save:hover {
      box-shadow: 0 0 20px var(--neon-green);
      transform: scale(1.02);
    }

    /* Navbar Estilizada */
    .app-nav {
      background: rgba(0, 0, 0, 0.9);
      border-bottom: 2px solid var(--neon-purple);
      backdrop-filter: blur(10px);
    }
  </style>
</head>

<body>

  <nav class="navbar navbar-expand-lg app-nav">
    <div class="container">
      <a class="navbar-brand fw-bold text-info orbitron" href="/">GAMEHUB_</a>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto gap-3">
          <li class="nav-item"><a class="nav-link text-white" href="/">Início</a></li>
          <li class="nav-item"><a class="nav-link text-white" href="/listar-livro">Biblioteca</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="container mt-5">
    <div class="row g-5">

      <div class="col-lg-8">
        <div class="mb-4">
          <h2 class="orbitron typing-animation">ADD_NEW_GAME_LOG</h2>
          <p class="text-dim">Insira os dados do game para sincronizar com o banco de dados.</p>
        </div>

        <form class="form-card" action="/cadastrar-livro" method="post">
          <div class="row g-4">
            <div class="col-md-6">
              <label class="form-label"><i class="bi bi-qr-code me-2"></i>Serial / ISBN</label>
              <input type="text" class="form-control" id="isbn" name="isbn" placeholder="GME-8842-X" required>
            </div>

            <div class="col-md-6">
              <label class="form-label"><i class="bi bi-controller me-2"></i>Título do Game</label>
              <input type="text" class="form-control" id="titulo" name="titulo" placeholder="Ex: God of War" required>
            </div>

            <div class="col-md-6">
              <label class="form-label"><i class="bi bi-cpu me-2"></i>Plataforma / Dev</label>
              <input type="text" class="form-control" id="autor" name="autor" placeholder="Ex: PlayStation 5" required>
            </div>

            <div class="col-md-6">
              <label class="form-label"><i class="bi bi-tags me-2"></i>Gênero</label>
              <input type="text" class="form-control" id="genero" name="genero" placeholder="Ex: RPG, Ação" required>
            </div>

            <div class="col-md-4">
              <label class="form-label">Edição</label>
              <input type="text" class="form-control" id="edicao" name="edicao" placeholder="Standard">
            </div>
            <div class="col-md-4">
              <label class="form-label">Editora</label>
              <input type="text" class="form-control" id="editora" name="editora" placeholder="Sony">
            </div>
            <div class="col-md-4">
              <label class="form-label">Ano</label>
              <input type="text" class="form-control" id="ano" name="ano" placeholder="2024">
            </div>
          </div>

          <div class="mt-5 d-flex gap-3">
            <button type="submit" class="btn btn-save">SINCRONIZAR_DADOS</button>
            <a href="/listar-livro" class="btn btn-outline-secondary d-flex align-items-center"
              style="border-radius:0;">CANCELAR</a>
          </div>
        </form>
      </div>

      <div class="col-lg-4">
        <h5 class="orbitron text-info mb-3">LIVE_PREVIEW</h5>
        <div class="game-preview-card">
          <div
            style="position:absolute; top:0; left:0; width:100%; height:100%; background: linear-gradient(45deg, #121212, #1a1a1a); display:grid; place-items:center;">
            <i class="bi bi-image text-secondary" style="font-size: 5rem; opacity: 0.2;"></i>
          </div>

          <div class="game-header">
            <div class="pv-platform" id="pv-autor">PLATAFORMA</div>
            <div class="pv-title text-uppercase" id="pv-titulo">NOME DO JOGO</div>
            <div class="d-flex justify-content-between align-items-center mt-2">
              <small class="text-dim" id="pv-genero">Gênero</small>
              <small class="orbitron text-info" id="pv-isbn">ID: ---</small>
            </div>
          </div>
        </div>
        <div class="mt-4 p-3 border border-secondary text-dim small">
          <i class="bi bi-info-circle me-2"></i> Os dados acima são uma representação visual de como o game aparecerá no
          inventário.
        </div>
      </div>

    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    // Script de Preview em Tempo Real
    const bind = (inputId, targetId, fallback) => {
      const inp = document.getElementById(inputId);
      const tgt = document.getElementById(targetId);
      if (!inp || !tgt) return;
      inp.addEventListener('input', () => {
        tgt.textContent = inp.value.trim() || fallback;
      });
    };

    bind('titulo', 'pv-titulo', 'NOME DO JOGO');
    bind('autor', 'pv-autor', 'PLATAFORMA');
    bind('genero', 'pv-genero', 'Gênero');
    bind('isbn', 'pv-isbn', 'ID: ---');
  </script>
</body>

</html>
