<!doctype html>
<html lang="pt-br">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GAMEHUB_ — Modifying Rental Timeline</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap"
    rel="stylesheet">

  <style>
    :root {
      --bg-900: #050505;
      --card-bg: #0f0f0f;
      --neon-purple: #bc13fe;
      --neon-blue: #00f3ff;
      --neon-green: #39ff14;
      --neon-amber: #f4d03f;
      --text-main: #e0e0e0;
      --text-dim: #94a3b8;
      --line: rgba(188, 19, 254, 0.2);
    }

    body {
      background-color: var(--bg-900);
      color: var(--text-main);
      font-family: 'Rajdhani', sans-serif;
      background-image: radial-gradient(circle at 50% 0%, rgba(0, 243, 255, 0.08) 0%, transparent 50%);
      min-height: 100vh;
    }

    .orbitron {
      font-family: 'Orbitron', sans-serif;
    }

    /* Navbar */
    .app-nav {
      background: rgba(0, 0, 0, 0.9);
      border-bottom: 2px solid var(--neon-purple);
      backdrop-filter: blur(10px);
    }

    .navbar-brand {
      font-family: 'Orbitron', sans-serif;
      color: var(--neon-blue) !important;
      text-shadow: 0 0 10px var(--neon-blue);
    }

    .nav-link {
      color: var(--text-dim) !important;
      text-transform: uppercase;
      font-weight: 600;
    }

    .nav-link:hover,
    .nav-link.active {
      color: var(--neon-green) !important;
      text-shadow: 0 0 8px var(--neon-green);
    }

    /* Card de Edição */
    .edit-card {
      background: var(--card-bg);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 40px;
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.8);
      position: relative;
    }

    .edit-card::before {
      content: "RENTAL_OVERRIDE";
      position: absolute;
      top: 15px;
      left: -35px;
      background: var(--neon-amber);
      color: #000;
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-size: 0.6rem;
      padding: 5px 40px;
      transform: rotate(-45deg);
    }

    .form-label {
      color: var(--neon-blue);
      font-family: 'Orbitron', sans-serif;
      font-size: 0.7rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    /* Inputs */
    .form-control {
      background: rgba(255, 255, 255, 0.03) !important;
      border: 1px solid rgba(255, 255, 255, 0.1) !important;
      color: var(--text-main) !important;
      border-radius: 6px !important;
      padding: 0.8rem 1rem !important;
      transition: all 0.3s;
    }

    .form-control:focus {
      border-color: var(--neon-purple) !important;
      box-shadow: 0 0 15px rgba(188, 19, 254, 0.2) !important;
    }

    .form-control[readonly] {
      background: rgba(0, 0, 0, 0.5) !important;
      color: var(--text-dim) !important;
      border-style: dashed !important;
      cursor: not-allowed;
    }

    /* Botão Salvar */
    .btn-save {
      background: transparent;
      color: var(--neon-green);
      border: 1px solid var(--neon-green);
      font-family: 'Orbitron', sans-serif;
      font-weight: 700;
      width: 100%;
      padding: 1rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      transition: all 0.4s;
      margin-top: 20px;
    }

    .btn-save:hover {
      background: var(--neon-green);
      color: #000;
      box-shadow: 0 0 30px rgba(57, 255, 20, 0.4);
    }

    .readonly-tag {
      font-size: 0.6rem;
      color: var(--neon-amber);
      display: block;
      margin-top: 5px;
    }
  </style>
</head>

<body>

  <nav class="navbar navbar-expand-lg app-nav">
    <div class="container">
      <a class="navbar-brand fw-bold" href="/">GAMEHUB_</a>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto gap-3">
          <li class="nav-item"><a class="nav-link" href="/">Início</a></li>
          <li class="nav-item dropdown">
            <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">Games</a>
            <ul class="dropdown-menu dropdown-menu-dark">
              <li><a class="dropdown-item" href="/cadastrar-livro">Add Game</a></li>
              <li><a class="dropdown-item" href="/listar-livro">Library</a></li>
            </ul>
          </li>
          <li class="nav-item"><a class="nav-link" href="/listar-leitor">Players</a></li>
          <li class="nav-item"><a class="nav-link active" href="/listar-emprestimo">Logs</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="container py-5 mt-4">
    <div class="row justify-content-center">
      <div class="col-lg-6">

        <div class="text-center mb-5">
          <h2 class="orbitron">EDIT_RENTAL_CONTRACT</h2>
          <p class="text-dim">Alterando prazos de devolução da transação <span class="text-info">#{{ emprestimo[0]
              }}</span></p>
        </div>

        <form class="edit-card" action="/editar-emprestimo" method="post">

          <div class="mb-4">
            <label for="id" class="form-label">Rental_ID</label>
            <input type="text" class="form-control" id="id" name="id" value="{{ emprestimo[0] }}" readonly>
            <span class="readonly-tag">* TRANSACTION_KEY: LOCKED</span>
          </div>

          <div class="row">
            <div class="col-md-6 mb-4">
              <label for="cpf" class="form-label">Player_Link (CPF)</label>
              <input type="text" class="form-control" id="cpf" name="cpf" value="{{ emprestimo[1] }}" readonly>
            </div>

            <div class="col-md-6 mb-4">
              <label for="isbn" class="form-label">Asset_Serial (ISBN)</label>
              <input type="text" class="form-control" id="isbn" name="isbn" value="{{ emprestimo[2] }}" readonly>
            </div>
          </div>

          <div class="row">
            <div class="col-md-6 mb-4">
              <label for="data-emprestimo" class="form-label">Rental_Date</label>
              <input type="date" class="form-control" id="data-emprestimo" name="data-emprestimo"
                value="{{ emprestimo[3] }}" readonly>
            </div>

            <div class="col-md-6 mb-4">
              <label for="data-devolucao" class="form-label text-warning">New_Deadline</label>
              <input type="date" class="form-control" style="border-color: var(--neon-amber) !important;"
                id="data-devolucao" name="data-devolucao" value="{{ emprestimo[4] }}" required>
            </div>
          </div>

          <div class="mt-2">
            <button type="submit" class="btn btn-save">
              <i class="bi bi-clock-history me-2"></i> EXTEND_CONTRACT
            </button>
            <div class="text-center mt-4">
              <a href="/listar-emprestimo" class="text-dim text-decoration-none small orbitron">
                <i class="bi bi-arrow-left"></i> BACK_TO_LOGS
              </a>
            </div>
          </div>

        </form>

      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
