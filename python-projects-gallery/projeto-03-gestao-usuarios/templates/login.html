<!doctype html>
<html lang="pt-br">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Acesso ao Sistema | SaaS Core</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    :root {
      --bg-body: #0f172a;
      --bg-card: #1e293b;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --primary-glow: #38bdf8;
      --input-bg: #0f172a;
      --border-color: #334155;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-body);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Navbar Dark */
    .navbar {
      background-color: rgba(15, 23, 42, 0.8) !important;
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border-color);
      padding: 1rem 0;
    }

    .navbar-brand {
      color: var(--primary-glow) !important;
      letter-spacing: -0.5px;
    }

    .nav-link {
      color: var(--text-muted) !important;
      transition: color 0.2s;
    }

    .nav-link:hover {
      color: var(--primary-glow) !important;
    }

    /* Card de Login */
    .card-dark {
      border: 1px solid var(--border-color);
      border-radius: 20px;
      background-color: var(--bg-card);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      padding: 1.5rem;
    }

    .card-header-dark {
      background: transparent;
      border: none;
      padding: 1.5rem 0;
    }

    .card-title {
      font-weight: 700;
      color: var(--text-main);
      font-size: 1.8rem;
      margin-bottom: 0.5rem;
    }

    /* Estilização de Inputs */
    .form-label {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .form-control {
      background-color: var(--input-bg);
      border: 1px solid var(--border-color);
      color: var(--text-main);
      padding: 0.8rem 1rem;
      border-radius: 12px;
      transition: all 0.3s ease;
    }

    .form-control:focus {
      background-color: var(--input-bg);
      border-color: var(--primary-glow);
      color: #fff;
      box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.15);
    }

    /* Botão Glow */
    .btn-glow {
      background: var(--primary-glow);
      color: #0f172a;
      border: none;
      padding: 0.8rem;
      border-radius: 12px;
      font-weight: 700;
      width: 100%;
      margin-top: 1.5rem;
      box-shadow: 0 4px 14px 0 rgba(56, 189, 248, 0.3);
      transition: all 0.3s ease;
    }

    .btn-glow:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(56, 189, 248, 0.5);
      background: #7dd3fc;
    }

    /* Mensagens do Flash (Erros de Login) */
    .alert-flash {
      background-color: rgba(248, 113, 113, 0.1);
      color: #f87171;
      border: 1px solid rgba(248, 113, 113, 0.2);
      border-radius: 10px;
      padding: 0.75rem;
      margin-bottom: 1.5rem;
      font-size: 0.9rem;
    }

    .login-container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>

<body>

  <header>
    <nav class="navbar navbar-expand-lg">
      <div class="container">
        <a class="navbar-brand fw-bold" href="/">PROJETO FLASK</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
          <span class="navbar-toggler-icon" style="filter: invert(1);"></span>
        </button>
        <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
          <ul class="navbar-nav align-items-center">
            <li class="nav-item"><a class="nav-link px-3" href="/usuario">Criar Conta</a></li>
            <li class="nav-item ms-lg-2">
              <a class="btn btn-outline-info btn-sm px-4" href="/login" style="border-radius: 8px;">Login</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>
  </header>

  <main class="login-container container">
    <div class="row justify-content-center w-100">
      <div class="col-12 col-md-6 col-lg-4">

        <div class="card-dark">
          <form action="/validar-login" method="post">

            <div class="card-header-dark text-center">
              <h3 class="card-title">Bem-vindo</h3>
              <p class="text-muted">Acesse sua conta para continuar.</p>
            </div>

            <div class="card-body p-0">

              {% set aviso = get_flashed_messages() %}
              {% if (aviso) %}
              <div class="alert-flash text-center">
                <i class="bi bi-exclamation-circle me-2"></i>{{aviso[0]}}
              </div>
              {% endif %}

              <div class="mb-3">
                <label for="cpf" class="form-label">CPF</label>
                <input type="text" class="form-control" id="cpf" name="cpf" placeholder="000.000.000-00" required>
              </div>

              <div class="mb-2">
                <div class="d-flex justify-content-between">
                  <label for="senha" class="form-label">Senha</label>
                  <a href="#" class="text-info small text-decoration-none" style="font-size: 0.75rem;">Esqueceu?</a>
                </div>
                <input type="password" class="form-control" id="senha" name="senha" placeholder="••••••••" required>
              </div>

              <button type="submit" class="btn btn-glow">Entrar no Sistema</button>

              <div class="text-center mt-4">
                <span class="text-muted small">Não tem acesso? <a href="/usuario"
                    class="text-info text-decoration-none fw-semibold">Cadastre-se</a></span>
              </div>
            </div>

          </form>
        </div>

      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
