<!doctype html>
<html lang="pt-br">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cadastro de Usuário | Plataforma Digital</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    :root {
      --bg-body: #0f172a;
      --bg-card: #1e293b;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --primary-glow: #38bdf8;
      --input-bg: #0f172a;
      --border-color: #334155;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-body);
      color: var(--text-main);
      min-height: 100vh;
    }

    /* Navbar Dark */
    .navbar {
      background-color: rgba(15, 23, 42, 0.8) !important;
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border-color);
      padding: 1rem 0;
    }

    .navbar-brand {
      color: var(--primary-glow) !important;
      letter-spacing: -0.5px;
    }

    .nav-link {
      color: var(--text-muted) !important;
      transition: color 0.2s;
    }

    .nav-link:hover {
      color: var(--primary-glow) !important;
    }

    /* Card SaaS Dark */
    .card-dark {
      border: 1px solid var(--border-color);
      border-radius: 20px;
      background-color: var(--bg-card);
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
      padding: 1rem;
    }

    .card-header-dark {
      background: transparent;
      border: none;
      padding-top: 1.5rem;
    }

    .card-title {
      font-weight: 700;
      color: var(--text-main);
      font-size: 1.75rem;
    }

    /* Inputs */
    .form-label {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-control {
      background-color: var(--input-bg);
      border: 1px solid var(--border-color);
      color: var(--text-main);
      padding: 0.8rem 1rem;
      border-radius: 10px;
      transition: all 0.3s ease;
    }

    .form-control:focus {
      background-color: var(--input-bg);
      border-color: var(--primary-glow);
      color: #fff;
      box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.15);
      outline: none;
    }

    input[type="date"]::-webkit-calendar-picker-indicator {
      filter: invert(1);
    }

    /* Botão Neon */
    .btn-dark-premium {
      background: var(--primary-glow);
      color: #0f172a;
      border: none;
      padding: 0.9rem;
      border-radius: 10px;
      font-weight: 700;
      width: 100%;
      margin-top: 1rem;
      box-shadow: 0 4px 14px 0 rgba(56, 189, 248, 0.3);
      transition: all 0.3s ease;
    }

    .btn-dark-premium:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(56, 189, 248, 0.4);
      background: #7dd3fc;
    }

    /* Mensagens do Flash */
    .alert-flash {
      background-color: rgba(248, 113, 113, 0.1);
      color: #f87171;
      border: 1px solid rgba(248, 113, 113, 0.2);
      border-radius: 10px;
      padding: 0.75rem;
      margin-bottom: 1.5rem;
      font-size: 0.9rem;
    }
  </style>
</head>

<body>

  <header>
    <nav class="navbar navbar-expand-lg">
      <div class="container">
        <a class="navbar-brand fw-bold" href="/">PROJETO FLASK</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
          <span class="navbar-toggler-icon" style="filter: invert(1);"></span>
        </button>
        <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
          <ul class="navbar-nav align-items-center">
            <li class="nav-item"><a class="nav-link" href="/usuario">Cadastro</a></li>
            <li class="nav-item ms-lg-3">
              <a class="btn btn-outline-info btn-sm px-4" href="/login"
                style="border-radius: 8px; color: var(--primary-glow); border-color: var(--primary-glow);">Login</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>
  </header>

  <main class="container py-5">
    <section class="row justify-content-center">
      <div class="col-12 col-md-8 col-lg-5">

        <div class="card-dark">
          <form action="/cadastrar-usuario" method="post">

            <div class="card-header-dark text-center">
              <h3 class="card-title">Crie sua conta</h3>
              <p class="text-muted">Preencha os dados abaixo para começar.</p>
            </div>

            <div class="card-body">

              {% set aviso = get_flashed_messages() %}
              {% if (aviso) %}
              <div class="alert-flash text-center">
                {{aviso[0]}}
              </div>
              {% endif %}

              <div class="mb-3">
                <label for="nome" class="form-label">Nome Completo</label>
                <input type="text" class="form-control" id="nome" name="nome" placeholder="Seu nome completo">
              </div>

              <div class="row">
                <div class="col-md-6 mb-3">
                  <label for="nascimento" class="form-label">Nascimento</label>
                  <input type="date" class="form-control" id="nascimento" name="nascimento">
                </div>
                <div class="col-md-6 mb-3">
                  <label for="cpf" class="form-label">CPF</label>
                  <input type="text" class="form-control" id="cpf" name="cpf" placeholder="000.000.000-00">
                </div>
              </div>

              <div class="mb-3">
                <label for="email" class="form-label">E-mail</label>
                <input type="email" class="form-control" id="email" name="email" placeholder="exemplo@email.com">
              </div>

              <div class="mb-4">
                <label for="senha" class="form-label">Senha</label>
                <input type="password" class="form-control" id="senha" name="senha" placeholder="••••••••">
              </div>

              <button type="submit" class="btn btn-dark-premium">Finalizar Cadastro</button>

              <div class="text-center mt-4">
                <span class="text-muted small">Já possui uma conta? <a href="/login"
                    class="text-info text-decoration-none">Entrar</a></span>
              </div>
            </div>

          </form>
        </div>

      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
