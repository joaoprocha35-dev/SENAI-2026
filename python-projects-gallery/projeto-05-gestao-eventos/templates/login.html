<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso | SGE</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --bg: #0f172a; /* Fundo dark profundo para ar premium */
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            margin: 0; 
        }

        .box { 
            background: white; 
            padding: 48px 40px; 
            border-radius: 16px; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); 
            width: 100%;
            max-width: 400px; 
        }

        .box h2 { 
            text-align: center; 
            color: #1e293b; 
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .box p {
            text-align: center;
            color: #64748b;
            font-size: 0.9rem;
            margin-bottom: 32px;
        }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: #475569;
            margin-bottom: 6px;
        }

        input { 
            width: 100%; 
            padding: 12px; 
            margin-bottom: 20px; 
            border: 1px solid #e2e8f0; 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-size: 1rem;
            transition: all 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        button { 
            width: 100%; 
            padding: 14px; 
            background: var(--primary); 
            color: white; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 1rem;
            font-weight: 600;
            transition: opacity 0.2s;
        }

        button:hover { opacity: 0.9; }

        .footer-link {
            text-align: center;
            margin-top: 24px;
            font-size: 0.85rem;
            color: #64748b;
        }
        
        .footer-link a { color: var(--primary); text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Bem-vindo de volta</h2>
        <p>Insira suas credenciais para acessar o SGE</p>
        
        <form action="/login" method="POST">
            <label for="username">Usuário</label>
            <input type="text" id="username" name="username" placeholder="Seu nome de usuário" required>
            
            <label for="password">Senha</label>
            <input type="password" id="password" name="password" placeholder="••••••••" required>
            
            <button type="submit">Entrar na plataforma</button>
        </form>

        <div class="footer-link">
            Não tem uma conta? <a href="/register">Criar uma conta</a>
        </div>
    </div>
</body>
</html>
