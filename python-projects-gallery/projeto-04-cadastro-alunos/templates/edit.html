<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='edit.css') }}">
    <title>Editar Aluno | Premium Admin</title>
</head>
<body class="saas-bg">
    <div class="form-container animate-slide-up">
        <header class="form-header">
            <a href="{{ url_for('index') }}" class="back-button">← Voltar</a>
            <h1>Editar Registro</h1>
            <p>Atualize as informações do aluno abaixo.</p>
        </header>

        <form action="{{ url_for('edit', id=student.id) }}" method="post" class="premium-form">
            <div class="input-group">
                <label for="name">Nome Completo</label>
                <input type="text" name="name" id="name" value="{{ student.name }}" placeholder="Ex: João Silva" required>
            </div>

            <div class="input-group">
                <label for="dob">Data de Nascimento</label>
                <input type="date" name="dob" id="dob" value="{{ student.dob }}" required>
            </div>

            <div class="input-group">
                <label for="address">Endereço Residencial</label>
                <input type="text" name="address" id="address" value="{{ student.address }}" placeholder="Rua, Número, Bairro" required>
            </div>

            <div class="input-group">
                <label for="class">Turma / Módulo</label>
                <input type="text" name="class" id="class" value="{{ student.class }}" placeholder="Ex: 2A - Informática" required>
            </div>

            <button type="submit" class="btn-update">Salvar Alterações</button>
        </form>
    </div>
</body>
</html>
