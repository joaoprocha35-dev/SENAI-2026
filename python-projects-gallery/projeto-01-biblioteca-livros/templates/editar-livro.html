<!doctype html>
<html lang="pt-br">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Papyro - Editar Livro</title>

  <!-- CSS do Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>

<body>

  <!-- Menu de navegação -->
  <nav class="navbar navbar-expand-lg bg-body-tertiary">
    <div class="container-fluid">
      <a class="navbar-brand text-uppercase fw-bold" href="/">Papyro</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavDropdown"
        aria-controls="navbarNavDropdown" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNavDropdown">
        <ul class="navbar-nav">

          <li class="nav-item">
            <a class="nav-link" href="/">Início</a>
          </li>

          <li class="nav-item dropdown">
            <a class="nav-link dropdown-toggle" role="button" data-bs-toggle="dropdown" aria-expanded="false">
              Livro
            </a>
            <ul class="dropdown-menu">
              <li><a class="dropdown-item" href="/cadastrar-livro">Cadastrar</a></li>
              <li><a class="dropdown-item" href="/listar-livro">Listar</a></li>
            </ul>
          </li>

          <li class="nav-item dropdown">
            <a class="nav-link dropdown-toggle" role="button" data-bs-toggle="dropdown" aria-expanded="false">
              Leitor
            </a>
            <ul class="dropdown-menu">
              <li><a class="dropdown-item" href="/cadastrar-leitor">Cadastrar</a></li>
              <li><a class="dropdown-item" href="/listar-leitor">Listar</a></li>
            </ul>
          </li>

          <li class="nav-item dropdown">
            <a class="nav-link dropdown-toggle" role="button" data-bs-toggle="dropdown" aria-expanded="false">
              Empréstimo
            </a>
            <ul class="dropdown-menu">
              <li><a class="dropdown-item" href="/realizar-emprestimo">Realizar</a></li>
              <li><a class="dropdown-item" href="/listar-emprestimo">Listar</a></li>
            </ul>
          </li>

        </ul>
      </div>
    </div>
  </nav>

  <!-- Painel principal -->
  <main class="container mt-5">

    <h3 class="text-center">Editar Livro</h3>

    <form class="col-6 border mx-auto p-5 mt-3" action="/editar-livro" method="post">

      <div class="mb-3">
        <label for="isbn" class="form-label">ISBN</label>
        <input type="text" class="form-control" id="isbn" name="isbn" value="{{ livro[0] }}" readonly>
      </div>

      <div class="mb-3">
        <label for="titulo" class="form-label">Título</label>
        <input type="text" class="form-control" id="titulo" name="titulo" value="{{ livro[1] }}" required>
      </div>

      <div class="mb-3">
        <label for="autor" class="form-label">Autor</label>
        <input type="text" class="form-control" id="autor" name="autor" value="{{ livro[2] }}" required>
      </div>

      <div class="mb-3">
        <label for="editora" class="form-label">Editora</label>
        <input type="text" class="form-control" id="editora" name="editora" value="{{ livro[3] }}" required>
      </div>

      <div class="mb-3">
        <label for="ano" class="form-label">Ano de Publicação</label>
        <input type="text" class="form-control" id="ano" name="ano" value="{{ livro[4] }}" required>
      </div>

      <div class="mb-3">
        <label for="genero" class="form-label">Gênero</label>
        <input type="text" class="form-control" id="genero" name="genero" value="{{ livro[5] }}" required>
      </div>

      <div class="mb-3">
        <label for="edicao" class="form-label">Edição</label>
        <input type="text" class="form-control" id="edicao" name="edicao" value="{{ livro[6] }}" required>
      </div>

      <div class="mb-3">
        <button type="submit" class="btn btn-success">Salvar</button>
      </div>

    </form>

  </main>

  <!-- Java Script do Bootstrap -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
    crossorigin="anonymous"></script>
</body>

</html>
