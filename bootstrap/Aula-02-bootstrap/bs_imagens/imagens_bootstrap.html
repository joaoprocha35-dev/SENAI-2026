<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <title>Imgens em BS5</title>
    <style>
        img {
            width: 400px;
            height: 200px;
        }
    </style>
</head>

<body>
    
    <div class="container-fluid">
        <h1 class="text-center bg-dark text-white">Guia pratico: Imagens no BootStrap 5</h1>
        <!--Formas de imagemns-->
        <section class="bg-black">
            <h2 class="text-center text-warning">Formas de Imagem</h2>
            <div class="row"> <!--Linha-->
                <div class="col mt-3 bg-black text-white text-center"> <!--coluna-->

                    <p class="text-warning">Imagens com cantos arredondados</p>
                    <img src="img/img4.jpg" alt="cantos_arredondados" class="rounded-4 mt-1 mb-4">
                    <!--rounded= cantos redondos-->
                </div>
                <div class="col mt-3 bg-black text-white text-center">
                    <p class="text-warning mt-3">Imagem Circular</p>
                    <img src="img/img5.jpg" alt="circular" class="rounded-circle mt-1">
                    <!-- rounded-circle: circulo-->
                    <img src="img/img6.jpeg" alt="cantos_arredondados" class="rounded-circle mt-3">

                </div>
                <div class="col mt-3 bg-black text-white text-center">
                    <p class="text-warning">Imagem em Miniatura</p>
                    <img src="img/img1.jpg" alt="miniatura" class="img-thumbnail mt-1">
                    <img src="img/img2.jpg" alt="miniatura" class="img-thumbnail mt-1">
                    <img src="img/img3.jpg" alt="miniatura" class="img-thumbnail mt-1">
                </div>

            </div>
        </section>
        <!--Alinhamento-->

        <section class="bg-black">
            <div class="bg-black">
                <h2 class="text-warning text-center">Alinhamento de Imagens</h2>
                <p class="text-warning text-center">Imagens a esquerda e à direita</p>
            </div>

            <img src="img/img4.jpg" alt="esquerda" class="float-start">
            <img src="img/img5.jpg" alt="direita" class="float-end">
            <div class="clearfix"></div> <!--Limpar fluatuaçāo-->
            <div class="text-center">
                <p class="text-center text-warning">Centralizar a Imagem</p>
                <img src="img/img5.jpg" alt="" class="mx-auto d-block">
            </div>

        </section>
    </div>


</body>

</html>
