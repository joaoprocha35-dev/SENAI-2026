<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relogio Digital</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            background-color: #111;
            color: violet;
            height: 100vh;
            /* centralizacao total */
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #relogio{
            font-size: 4em;
            padding: 20px 40px;
            border: 2px solid #0f0;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div id="relogio">

    </div>


    <script>
        var relogio = document.getElementById("relogio") //obtenha o elemento por id

        

        function atualizarRelogio(){  //crie uma funcao atualizarRelogio
            // var agora = new Date() 
            // relogio.innerText = agora.toLocaleTimeString("pt-BR",{
            //     hour12:false,
            //     fractionalSecondDigits: 1
            // })

            var agora = new Date()
            var h = String(agora.getHours()).padStart(2, "0")
            var m = String(agora.getMinutes()).padStart(2, "0")
            var s = String(agora.getSeconds()).padStart(2, "0")
            var ms = String(agora.getMilliseconds()).padStart(2, "0")

            var mudaSec = agora.getSeconds()
            if(mudaSec%2===0){
                document.body.style.background="red"
            }
            else{
                document.body.style.background="green"
            }
            

            relogio.innerText = `${h}:${m}:${s}:${ms}`
        } 
        // atualizarRelogio()
        setInterval(atualizarRelogio, 1)  
    </script>
</body>
</html>
