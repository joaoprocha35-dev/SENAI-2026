<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contador com Limite</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            background-color: #111;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            margin-top: 80px;
        }
        #contador{
            font-size: 3em;
            width: 120px;
            text-align: center;
            padding: 10px;
            border: 2px solid black;
            border-radius: 8px;
            background: white;
        }
        button{
            padding: 10px 20px;
            font-size: 1.2em;
            margin: 0 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="contador">0</div>
    <div>
        <button id="menos">-</button>
        <button id="mais">+</button>
    </div>

    <script>
        var contador = 0
        var contagem = document.getElementById('contador')
        var mais = document.getElementById('mais')
        var menos = document.getElementById('menos')

        mais.addEventListener("click", aumentar )
        function aumentar(){
            if(contador <= 20) contador ++
            contagem.innerText = contador
        }
        menos.addEventListener("click", diminuir )

        function diminuir(){
            contador--
            contagem.innerText = contador
        }
    </script>
</body>
</html>
